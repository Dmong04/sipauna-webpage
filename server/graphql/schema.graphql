# ── Types ─────────────────────────────────────────────────────────────────────

type User {
  userId:   ID!
  email:    String!
  fullname: String!
  roleId:   String!
  roleName: String!
}

type AuthPayload {
  token: String!
  user:  User!
}

type Classroom {
  classroomId: ID!
  code:        String!
  capacity:    Int!
}

type Schedule {
  scheduleId:    ID!
  classroomCode: String!
  day:           String!
  startTime:     String!
  endTime:       String!
  subject:       String!
  teacherName:   String!
}

type Loan {
  loanId:        ID!
  classroomCode: String!
  userId:        ID!
  requesterName: String!
  loanDate:      String!
  startTime:     String!
  endTime:       String!
  reason:        String!
  status:        String!
}

# ── Queries ───────────────────────────────────────────────────────────────────

type Query {
  users:                      [User!]!
  user(userId: ID!):          User
  classrooms:                 [Classroom!]!
  classroom(classroomId: ID!): Classroom
  schedules:                  [Schedule!]!
  loans:                      [Loan!]!
  loansByUser(userId: ID!):   [Loan!]!
}

# ── Mutations ─────────────────────────────────────────────────────────────────

type Mutation {
  login(email: String!, password: String!): AuthPayload

  createClassroom(code: String!, capacity: Int!): Classroom
  updateClassroom(classroomId: ID!, code: String, capacity: Int): Classroom
  deleteClassroom(classroomId: ID!): Boolean

  createLoan(
    classroomCode: String!
    userId:        ID!
    loanDate:      String!
    startTime:     String!
    endTime:       String!
    reason:        String!
  ): Loan

  updateLoanStatus(loanId: ID!, status: String!): Loan
}
